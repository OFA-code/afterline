# Deploy: https://render.com/deploy?repo=https://github.com/OFA-code/afterline
services:
  - type: web
    name: afterline-api
    runtime: node
    plan: free
    rootDir: apps/afterline
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NOTIFY_EMAIL
        value: deallomcconnell@optimalflowagency.io
      - key: DEFAULT_CLIENT_ID
        value: demo
      - key: ADMIN_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
