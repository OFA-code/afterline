<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book audit — Afterline</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .book-form { max-width: 480px; margin: 0 auto; text-align: left; }
    .book-form label { display: block; font-size: 0.85rem; color: var(--muted); margin: 16px 0 6px; }
    .book-form input, .book-form textarea {
      width: 100%; padding: 12px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text); font: inherit;
    }
    .book-form textarea { min-height: 80px; resize: vertical; }
    .success { display: none; background: rgba(34,197,94,0.15); border: 1px solid var(--green); padding: 20px; border-radius: 12px; margin-top: 24px; }
    .success.show { display: block; }
    .err { color: #f87171; font-size: 0.9rem; margin-top: 12px; display: none; }
    .err.show { display: block; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none">After<span>line</span></a></div>
    </div>
  </header>
  <section class="hero" style="padding-top:48px">
    <div class="wrap">
      <h1 style="font-size:1.75rem">15-min Revenue Leak Audit</h1>
      <p class="sub" style="margin-bottom:32px">No pitch deck. We look at missed calls, estimates, and reviews — you decide if the pilot makes sense.</p>
      <form class="book-form" id="form">
        <label>Your name</label>
        <input name="name" required placeholder="Mike" />
        <label>Company</label>
        <input name="company" required placeholder="ABC Heating & Air" />
        <label>Phone</label>
        <input name="phone" type="tel" required placeholder="+1 555 123 4567" />
        <label>Email</label>
        <input name="email" type="email" required placeholder="you@company.com" />
        <label>What's your biggest leak? (optional)</label>
        <textarea name="message" placeholder="Missed calls after hours, estimates going cold..."></textarea>
        <p style="margin-top:24px">
          <button type="submit" class="btn" id="submitBtn" style="border:none;cursor:pointer;width:100%">Request audit</button>
        </p>
        <p class="err" id="err"></p>
      </form>
      <div class="success" id="success">
        <strong>Request received.</strong>
        <p style="color:var(--muted);margin-top:8px">We'll reach out within one business day. Questions? <a href="mailto:deallomcconnell@optimalflowagency.io">deallomcconnell@optimalflowagency.io</a></p>
      </div>
      <p style="margin-top:32px;text-align:center;font-size:0.85rem;color:var(--muted)">
        <a href="index.html">← Back to home</a>
      </p>
    </div>
  </section>
  <script>
    window.AFTERLINE_BOOK_EMAIL = 'deallomcconnell@optimalflowagency.io';
    window.AFTERLINE_CC_EMAIL = 'deallomcconnell@gmail.com';
    window.AFTERLINE_API = 'http://localhost:3847';
    window.AFTERLINE_PUBLIC_API = 'https://afterline-api.vercel.app';

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('err');
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      const showSuccess = () => {
        document.getElementById('form').style.display = 'none';
        document.getElementById('success').classList.add('show');
      };

      const mailto = () => {
        window.location.href = 'mailto:' + window.AFTERLINE_BOOK_EMAIL + '?' + new URLSearchParams({
          subject: 'Audit request — ' + (body.company || 'home service'),
          body: Object.entries(body).map(([k, v]) => k + ': ' + v).join('\n'),
        }).toString();
      };

      if (isLocal && window.AFTERLINE_API) {
        try {
          const res = await fetch(window.AFTERLINE_API + '/api/book-audit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (res.ok) { showSuccess(); return; }
        } catch { /* continue */ }
      }

      const publicApi = (window.AFTERLINE_PUBLIC_API || '').trim();
      if (publicApi) {
        try {
          const res = await fetch(publicApi.replace(/\/$/, '') + '/api/book-audit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (res.ok) { showSuccess(); return; }
        } catch { /* continue */ }
      }

      try {
        const payload = {
          name: body.name,
          company: body.company,
          phone: body.phone,
          email: body.email,
          message: body.message || '',
          _subject: 'Afterline audit — ' + body.company,
          _template: 'table',
          _captcha: 'false',
        };
        if (window.AFTERLINE_CC_EMAIL && window.AFTERLINE_CC_EMAIL.trim()) {
          payload._cc = window.AFTERLINE_CC_EMAIL.trim();
        }
        const res = await fetch('https://formsubmit.co/ajax/' + encodeURIComponent(window.AFTERLINE_BOOK_EMAIL), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.ok) { showSuccess(); return; }
      } catch { /* continue */ }

      btn.disabled = false;
      btn.textContent = 'Request audit';
      errEl.textContent = 'Could not send online — opening your email app instead.';
      errEl.classList.add('show');
      setTimeout(mailto, 800);
    });
  </script>
</body>
</html>
